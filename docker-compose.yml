services:
  postgres:
    image: postgres:16-alpine
    container_name: tabidao-pg
    environment:
      POSTGRES_USER: tabidao
      POSTGRES_PASSWORD: tabidao
      POSTGRES_DB: tabidao
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
